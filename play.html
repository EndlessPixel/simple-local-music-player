<!DOCTYPE html>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音乐播放器</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#121212;color:#e0e0e0;padding:25px;font-family:Arial;max-width:90%;margin:0 auto}
    h2{text-align:center;margin-bottom:20px;color:#1ed760}
    #player{width:100%;margin:20px 0;border-radius:8px}
    .control-buttons{display:flex;gap:10px;justify-content:center;margin:15px 0}
    button{padding:10px 18px;background:#1ed760;color:#000;border:none;border-radius:50px;cursor:pointer}
    button:disabled{background:#333}
    #status{color:#1ed760;text-align:center}
    #list{max-height:35vw;overflow-y:auto;border:1px solid #292929;padding:10px;border-radius:10px;background:#1a1a1a}
    .song{padding:9px;cursor:pointer;border-bottom:1px solid #242424}
    .song.active{background:#1ed760;color:#000}
</style>

<h2>🎵 音乐播放器</h2>
<div class="control-buttons">
    <button onclick="loadSongs()">🔄 刷新</button>
    <button id="prev" disabled onclick="prev()">⬅️ 上一曲</button>
    <button id="next" disabled onclick="next()">➡️ 下一曲</button>
    <button id="loop" disabled onclick="toggleLoop()">🔁 循环</button>
</div>
<div id="status">加载中...</div>
<div id="list"></div>
<audio id="player" controls></audio>

<script>
    const p = document.getElementById('player')
    const list = document.getElementById('list')
    const status = document.getElementById('status')
    let songs = [], idx = 0, loop = 'list'

    window.onload = loadSongs

    async function loadSongs() {
        list.innerHTML = '加载中...'
        const res = await fetch('/api/songs')
        songs = await res.json()
        render()
        status.textContent = `✅ 共 ${songs.length} 首`
        document.querySelectorAll('button').forEach(b => b.disabled = false)
    }

    function render() {
        list.innerHTML = ''
        songs.forEach((s, i) => {
            const d = document.createElement('div')
            d.className = 'song'
            d.textContent = `${i+1}. ${s.name}`
            d.onclick = () => play(i)
            list.appendChild(d)
        })
    }

    function play(i) {
        idx = i
        p.src = '/'+songs[i].path
        p.play()
        document.querySelectorAll('.song').forEach((e, j) => e.classList.toggle('active', j === i))
        status.textContent = `▶️ ${songs[i].name}`
    }

    function prev() { play((idx-1+songs.length)%songs.length) }
    function next() { play((idx+1)%songs.length) }
    function toggleLoop() {
        loop = loop === 'list' ? 'single' : loop === 'single' ? 'random' : 'list'
        document.getElementById('loop').textContent = {list:'🔁 列表', single:'🔂 单曲', random:'🔀 随机'}[loop]
        p.loop = loop === 'single'
    }

    p.onended = () => {
        if(loop === 'random') play(Math.floor(Math.random()*songs.length))
        else if(loop === 'list') next()
    }
</script>
